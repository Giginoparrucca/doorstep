<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WelcomeBnB · Admin Analytics</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --warm:#C2714F; --warm-d:#A85D3E; --ink:#1E1008; --ink-2:#2E1810; --ink-soft:#5C3D2E;
  --cream:#FAF6F0; --cream-2:#F0E8DC; --cream-3:#E4D8C8; --white:#FFFFFF;
  --green:#4CAF7D; --amber:#E8A840; --red:#D94B4B; --blue:#4A90D9;
  --border:rgba(194,113,79,0.12); --shadow:0 2px 12px rgba(30,16,8,0.06);
  --radius:10px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'DM Sans',sans-serif;background:var(--cream);color:var(--ink);min-height:100vh;}

.top-bar{
  background:var(--ink);padding:14px 24px;display:flex;align-items:center;justify-content:space-between;
  position:sticky;top:0;z-index:50;
}
.top-bar-brand{font-family:'Playfair Display',serif;font-size:1.1rem;color:#fff;font-weight:400;}
.top-bar-brand em{color:var(--warm);font-style:normal;}
.top-bar-badge{font-size:0.65rem;letter-spacing:0.15em;text-transform:uppercase;color:rgba(244,237,224,0.85);margin-left:10px;}
.top-bar-right{display:flex;align-items:center;gap:12px;flex-wrap:wrap;}
.top-bar-right select{
  background:rgba(255,255,255,0.15);border:1px solid rgba(255,255,255,0.35);border-radius:6px;
  color:#fff;padding:8px 12px;font-size:0.85rem;font-family:'DM Sans',sans-serif;font-weight:500;
}
.top-bar-right select option { background:#1E1008; color:#fff; }
.refresh-btn{
  background:var(--warm);border:none;color:#fff;padding:8px 14px;border-radius:6px;
  font-size:0.82rem;font-family:'DM Sans',sans-serif;font-weight:500;cursor:pointer;
}
.refresh-btn:hover{background:var(--warm-d);}

.container{max-width:1100px;margin:0 auto;padding:20px 20px 60px;}

.section-title{
  font-size:0.62rem;letter-spacing:0.18em;text-transform:uppercase;color:var(--ink-2);
  margin:28px 0 12px;padding-bottom:8px;border-bottom:1px solid var(--border);font-weight:600;
}
.section-title:first-child{margin-top:0;}

/* Stats grid */
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:12px;margin-bottom:8px;}
.stat{
  background:var(--white);border:1px solid var(--border);border-radius:var(--radius);
  padding:16px 18px;box-shadow:var(--shadow);
}
.stat-label{font-size:0.65rem;letter-spacing:0.14em;text-transform:uppercase;color:var(--ink-2);margin-bottom:4px;font-weight:600;}
.stat-val{font-family:'Playfair Display',serif;font-size:1.8rem;font-weight:500;line-height:1;}
.stat-sub{font-size:0.75rem;color:var(--ink-soft);margin-top:4px;}
.stat-val.green{color:var(--green);} .stat-val.amber{color:var(--amber);} .stat-val.red{color:var(--red);} .stat-val.blue{color:var(--blue);}

/* Bar chart */
.bar-chart{display:flex;flex-direction:column;gap:6px;}
.bar-row{display:flex;align-items:center;gap:10px;}
.bar-label{width:140px;font-size:0.82rem;color:var(--ink);text-align:right;flex-shrink:0;font-weight:500;}
.bar-track{flex:1;height:24px;background:var(--cream-2);border-radius:4px;overflow:hidden;position:relative;}
.bar-fill{height:100%;border-radius:4px;transition:width 0.6s ease;}
.bar-count{position:absolute;right:8px;top:50%;transform:translateY(-50%);font-size:0.68rem;font-weight:600;color:var(--ink);}

/* Table */
.data-table{
  width:100%;border-collapse:collapse;background:var(--white);
  border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;box-shadow:var(--shadow);
}
.data-table th{
  text-align:left;padding:10px 14px;font-size:0.6rem;letter-spacing:0.12em;
  text-transform:uppercase;color:var(--ink-soft);border-bottom:1px solid var(--border);
  background:rgba(250,246,240,0.5);font-weight:600;
}
.data-table td{padding:10px 14px;font-size:0.82rem;border-bottom:1px solid rgba(194,113,79,0.06);color:var(--ink-2);}
.data-table tr:last-child td{border-bottom:none;}
.data-table tr:hover td{background:rgba(250,246,240,0.6);}

/* Event log */
.event-log{max-height:400px;overflow-y:auto;border:1px solid var(--border);border-radius:var(--radius);background:var(--white);box-shadow:var(--shadow);}
.event-row{
  display:flex;align-items:center;gap:10px;padding:8px 14px;
  border-bottom:1px solid rgba(194,113,79,0.04);font-size:0.78rem;
}
.event-row:last-child{border-bottom:none;}
.event-time{font-size:0.75rem;color:var(--ink-2);min-width:130px;flex-shrink:0;}
.event-type{
  padding:3px 10px;border-radius:4px;font-size:0.72rem;font-weight:600;letter-spacing:0.04em;
  background:var(--cream-2);color:var(--ink-2);flex-shrink:0;
}
.event-type.login{background:rgba(76,175,125,0.12);color:#2d7a4a;}
.event-type.export{background:rgba(194,113,79,0.12);color:var(--warm);}
.event-type.save{background:rgba(74,144,217,0.12);color:#3570a8;}
.event-user{font-size:0.78rem;color:var(--ink-2);flex-shrink:0;min-width:120px;}
.event-detail{font-size:0.75rem;color:var(--ink-2);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}

.loading{text-align:center;padding:40px;color:var(--ink-soft);font-size:0.88rem;}

@media(max-width:600px){
  .container{padding:14px 12px 40px;}
  .stats{grid-template-columns:1fr 1fr;}
  .stat{padding:12px 14px;}
  .stat-val{font-size:1.4rem;}
  .bar-label{width:100px;font-size:0.7rem;}
  .event-row{flex-wrap:wrap;gap:4px;}
  .event-time{min-width:auto;}
  .event-user{min-width:auto;}
  .data-table th,.data-table td{padding:8px 10px;font-size:0.75rem;}
}

/* ── Login overlay ── */
#loginOverlay {
  position: fixed; inset: 0; z-index: 1000;
  background: linear-gradient(135deg, var(--ink) 0%, #2a1810 100%);
  display: flex; align-items: center; justify-content: center;
  padding: 20px; transition: opacity 0.3s ease;
}
#loginOverlay.hidden { opacity: 0; pointer-events: none; }
.login-card {
  background: var(--white); border-radius: 16px; padding: 36px 32px;
  width: 100%; max-width: 380px; box-shadow: 0 20px 60px rgba(0,0,0,0.4);
}
.login-brand { font-family: 'Playfair Display', serif; font-size: 1.6rem; color: var(--ink); margin-bottom: 4px; }
.login-brand em { color: var(--warm); font-style: normal; }
.login-badge { display:inline-block; font-size: 0.6rem; letter-spacing: 0.18em; text-transform: uppercase; color: var(--warm); margin-bottom: 24px; font-weight: 600; }
.login-label { display: block; font-size: 0.7rem; letter-spacing: 0.08em; text-transform: uppercase; color: var(--ink-2); font-weight: 600; margin-bottom: 6px; margin-top: 12px; }
.login-input {
  width: 100%; padding: 11px 14px; border: 1px solid var(--cream-3); border-radius: 8px;
  font-size: 0.95rem; font-family: inherit; color: var(--ink); background: var(--cream);
  transition: border-color 0.15s;
}
.login-input:focus { outline: none; border-color: var(--warm); background: var(--white); }
.login-btn {
  width: 100%; padding: 12px; margin-top: 20px;
  background: var(--ink); color: #fff; border: none; border-radius: 8px;
  font-size: 0.92rem; font-weight: 600; cursor: pointer;
  font-family: inherit; transition: background 0.15s;
}
.login-btn:hover:not(:disabled) { background: var(--warm); }
.login-btn:disabled { opacity: 0.6; cursor: not-allowed; }
.login-error {
  margin-top: 12px; padding: 10px 12px; background: rgba(217,75,75,0.08);
  border: 1px solid rgba(217,75,75,0.25); border-radius: 6px;
  color: var(--red); font-size: 0.82rem; display: none;
}
.login-error.show { display: block; }
.login-foot { margin-top: 18px; padding-top: 16px; border-top: 1px solid var(--cream-3);
  font-size: 0.7rem; color: var(--ink-soft); text-align: center; line-height: 1.5; }
.top-bar-user {
  font-size: 0.72rem; color: rgba(244,237,224,0.75); margin-right: 4px;
  display: flex; align-items: center; gap: 6px;
}
.top-bar-user-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--green); }
.top-bar-signout {
  background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2);
  color: #fff; padding: 6px 10px; border-radius: 6px;
  font-size: 0.72rem; cursor: pointer; font-family: inherit;
}
.top-bar-signout:hover { background: rgba(255,255,255,0.18); }

/* ── Admin row actions ── */
.admin-actions { display: flex; gap: 4px; flex-wrap: nowrap; align-items: center; }
.admin-action-btn {
  background: var(--cream-2); border: 1px solid var(--cream-3); color: var(--ink-2);
  border-radius: 5px; padding: 3px 7px; font-size: 0.68rem; font-family: inherit;
  cursor: pointer; line-height: 1; white-space: nowrap; font-weight: 500;
  transition: background 0.12s, border-color 0.12s, color 0.12s;
}
.admin-action-btn:hover { background: var(--cream-3); border-color: var(--warm); }
.admin-action-btn:disabled { opacity: 0.45; cursor: not-allowed; }
.admin-action-btn.danger { color: var(--red); border-color: rgba(217,75,75,0.25); }
.admin-action-btn.danger:hover { background: rgba(217,75,75,0.1); border-color: var(--red); }
.admin-action-btn.warn { color: #B07A4B; border-color: rgba(176,122,75,0.25); }
.admin-action-btn.warn:hover { background: rgba(176,122,75,0.1); border-color: #B07A4B; }
.admin-action-btn.success { color: var(--green); border-color: rgba(76,175,125,0.25); }
.admin-action-btn.success:hover { background: rgba(76,175,125,0.1); border-color: var(--green); }

/* Hidden row markers */
tr.row-test td, tr.row-deleted td { opacity: 0.65; }
tr.row-test td:first-child::before {
  content: '🧪 TEST'; display: inline-block; font-size: 0.55rem; padding: 2px 5px;
  background: rgba(232,168,64,0.2); color: #8a6024; border-radius: 3px; margin-right: 6px;
  font-weight: 700; letter-spacing: 0.05em;
}
tr.row-deleted td:first-child::before {
  content: '🗑 DELETED'; display: inline-block; font-size: 0.55rem; padding: 2px 5px;
  background: rgba(217,75,75,0.2); color: #b03a3a; border-radius: 3px; margin-right: 6px;
  font-weight: 700; letter-spacing: 0.05em;
}
tr.row-test.row-deleted td:first-child::before { content: '🗑 TEST + DELETED'; }

/* ── Purge confirm modal ── */
#purgeModal {
  position: fixed; inset: 0; z-index: 999;
  background: rgba(30,16,8,0.72); display: none;
  align-items: center; justify-content: center; padding: 20px;
}
#purgeModal.show { display: flex; }
.purge-card {
  background: var(--white); border-radius: 12px; padding: 28px 26px;
  width: 100%; max-width: 460px; box-shadow: 0 20px 60px rgba(0,0,0,0.4);
}
.purge-title {
  font-family: 'Playfair Display', serif; font-size: 1.3rem; color: var(--red);
  margin-bottom: 6px; display: flex; align-items: center; gap: 8px;
}
.purge-warning {
  background: rgba(217,75,75,0.08); border: 1px solid rgba(217,75,75,0.25);
  border-radius: 8px; padding: 12px 14px; margin: 14px 0;
  font-size: 0.83rem; color: var(--ink-2); line-height: 1.5;
}
.purge-warning strong { color: var(--red); }
.purge-detail {
  font-size: 0.78rem; color: var(--ink-soft); margin-bottom: 10px;
  background: var(--cream); padding: 10px 12px; border-radius: 6px;
  font-family: monospace; word-break: break-all;
}
.purge-confirm-label {
  font-size: 0.78rem; color: var(--ink-2); margin-top: 8px; display: block;
}
.purge-confirm-label strong { color: var(--red); font-family: monospace; background: var(--cream); padding: 1px 6px; border-radius: 3px; }
.purge-input {
  width: 100%; padding: 10px 12px; margin-top: 6px;
  border: 1px solid var(--cream-3); border-radius: 6px;
  font-size: 0.95rem; font-family: monospace;
}
.purge-input:focus { outline: none; border-color: var(--red); }
.purge-actions { display: flex; gap: 8px; margin-top: 18px; justify-content: flex-end; }
.purge-actions button {
  padding: 9px 16px; border-radius: 6px; font-size: 0.85rem;
  font-family: inherit; cursor: pointer; font-weight: 500; border: 1px solid;
}
.purge-actions .btn-cancel { background: var(--white); border-color: var(--cream-3); color: var(--ink-2); }
.purge-actions .btn-cancel:hover { background: var(--cream); }
.purge-actions .btn-confirm { background: var(--red); border-color: var(--red); color: #fff; }
.purge-actions .btn-confirm:disabled { opacity: 0.45; cursor: not-allowed; background: var(--ink-soft); border-color: var(--ink-soft); }
.purge-error {
  margin-top: 8px; padding: 8px 10px; background: rgba(217,75,75,0.1);
  border-radius: 5px; color: var(--red); font-size: 0.78rem; display: none;
}
.purge-error.show { display: block; }

/* Toast */
#adminToast {
  position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(20px);
  background: var(--ink); color: #fff; padding: 12px 20px; border-radius: 8px;
  font-size: 0.88rem; box-shadow: 0 6px 24px rgba(0,0,0,0.3);
  opacity: 0; pointer-events: none; transition: opacity 0.2s, transform 0.2s; z-index: 1001;
  max-width: 90%; text-align: center;
}
#adminToast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
#adminToast.error { background: var(--red); }
#adminToast.success { background: var(--green); }
</style>
</head>
<body>

<!-- Toast notifier -->
<div id="adminToast"></div>

<!-- Purge (hard-delete) confirmation modal — typed-confirm gate -->
<div id="purgeModal" onclick="if(event.target===this)closePurgeModal()">
  <div class="purge-card">
    <div class="purge-title">⚠️ Permanent deletion</div>
    <div style="font-size:0.85rem;color:var(--ink-soft);">This cannot be undone. Foreign keys will cascade.</div>
    <div class="purge-warning" id="purgeWarning"></div>
    <div class="purge-detail" id="purgeDetail"></div>
    <label class="purge-confirm-label">
      Type <strong id="purgeConfirmText">CONFIRM</strong> to proceed:
    </label>
    <input id="purgeInput" class="purge-input" autocomplete="off" oninput="onPurgeInput()">
    <div class="purge-error" id="purgeError"></div>
    <div class="purge-actions">
      <button class="btn-cancel" onclick="closePurgeModal()">Cancel</button>
      <button class="btn-confirm" id="purgeConfirmBtn" onclick="executePurge()" disabled>Delete permanently</button>
    </div>
  </div>
</div>

<!-- Login overlay — covers everything until admin signs in -->
<div id="loginOverlay">
  <div class="login-card">
    <div class="login-brand">WelcomeBnB <em>Admin</em></div>
    <div class="login-badge">Authorised access only</div>

    <label class="login-label" for="loginEmail">Admin Email</label>
    <input id="loginEmail" type="email" class="login-input" autocomplete="email" placeholder="admin@…">

    <label class="login-label" for="loginPassword">Password</label>
    <input id="loginPassword" type="password" class="login-input" autocomplete="current-password">

    <button id="loginBtn" class="login-btn" onclick="adminSignIn()">Sign In</button>

    <div id="loginError" class="login-error"></div>

    <div class="login-foot">
      Admin accounts must be added via the <code style="font-family:monospace;font-size:0.7rem;">admin_users</code> table in Supabase.<br>
      Forgot password? Reset via Supabase Auth dashboard.
    </div>
  </div>
</div>

<div class="top-bar">
  <div>
    <span class="top-bar-brand">Welcome<em>BnB</em></span>
    <span class="top-bar-badge">Admin Analytics</span>
  </div>
  <div class="top-bar-right">
    <select id="userFilter" onchange="renderView()">
      <option value="all">All Users</option>
    </select>
    <select id="timeRange" onchange="loadData()">
      <option value="7">Last 7 days</option>
      <option value="30" selected>Last 30 days</option>
      <option value="90">Last 90 days</option>
      <option value="365">Last year</option>
      <option value="9999">All time</option>
    </select>
    <button class="refresh-btn" onclick="exportData('csv')" title="Export CSV">📥 CSV</button>
    <button class="refresh-btn" onclick="exportData('json')" title="Export JSON">📥 JSON</button>
    <button class="refresh-btn" onclick="loadData()">↻ Refresh</button>
    <label id="showHiddenLabel" style="display:flex;align-items:center;gap:6px;font-size:0.72rem;color:rgba(244,237,224,0.85);cursor:pointer;padding:6px 10px;border:1px solid rgba(255,255,255,0.18);border-radius:6px;user-select:none;">
      <input type="checkbox" id="showHiddenToggle" onchange="toggleShowHidden(this.checked)" style="cursor:pointer;">
      <span>Show hidden</span>
    </label>
    <span class="top-bar-user" id="topBarUser" style="display:none;">
      <span class="top-bar-user-dot"></span><span id="topBarUserEmail">—</span>
    </span>
    <button class="top-bar-signout" id="topBarSignOut" onclick="adminSignOut()" style="display:none;">Sign out</button>
  </div>
</div>

<div class="container">
  <div id="content"><div class="loading">Loading analytics…</div></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script>
const SUPABASE_URL = 'https://jcjwaqqabgwqhhzhfbts.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImpjandhcXFhYmd3cWhoemhmYnRzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM4OTM0MjMsImV4cCI6MjA4OTQ2OTQyM30.BCskfjawOLqayI7xXV8ebIBEcXf12WygH52w204NzWk';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

let allEvents = [];
let allProperties = [];
let allRecommendations = [];
let allCheckins = [];

// Show-hidden toggle: when on, queries include test+deleted rows so admin
// can see everything that needs cleanup. When off (default), filtered out.
let showHidden = false;

/* ══════════════════════════════════════
   ADMIN ACTIONS — destructive operations on data.
   Three tiers, in order of severity:
     🧪 markTest       — flag row as test data; reversible.
     🗑 softDelete     — hide row everywhere; reversible until purged.
     💀 purge          — permanent DELETE; gated by typed-confirm modal.
   Plus: ↩️ restore (clears deleted_at), unmarkTest (clears is_test).
   Every successful action triggers loadData() to refresh.
══════════════════════════════════════ */

// Map of editable tables — ensures user input can't pivot to arbitrary
// table names. Add to this map only when you've audited the table for
// FK behaviour and confirmed the soft-delete columns exist.
const ADMIN_TABLES = {
  analytics_events: { label: 'Event',          identifier: (r) => r.event_type + ' · ' + (r.session_id || '?').slice(0, 8) },
  checkins:         { label: 'Check-in',       identifier: (r) => `${r.surname || '?'} ${r.name || ''} (${r.booking_code || '—'})`.trim() },
  chat_messages:    { label: 'Chat message',   identifier: (r) => `${r.sender || '?'}: ${(r.message || '').slice(0, 40)}` },
  recommendations:  { label: 'Recommendation', identifier: (r) => r.name || '?' },
  properties:       { label: 'Property',       identifier: (r) => r.name || '?' },
};

// Toast helper — shown bottom-center for ~2.5s.
function adminToast(msg, type) {
  const t = document.getElementById('adminToast');
  if (!t) return;
  t.textContent = msg;
  t.className = type ? type : '';
  t.classList.add('show');
  clearTimeout(t._timer);
  t._timer = setTimeout(() => t.classList.remove('show'), 2500);
}

// Toggle visibility of test+deleted rows in admin tables.
function toggleShowHidden(checked) {
  showHidden = !!checked;
  loadData();
}

// Mark a row as test data. is_test flag → row hidden from analytics + apps,
// but the row itself is preserved. Reversible via unmarkTest.
async function markTest(table, id) {
  if (!ADMIN_TABLES[table]) return adminToast('Unknown table', 'error');
  const { data, error } = await sb.from(table).update({ is_test: true }).eq('id', id).select();
  if (error) return adminToast(`Mark test failed: ${error.message}`, 'error');
  if (!data || data.length === 0) return adminToast(`No row updated — RLS may be blocking. Check admin policies.`, 'error');
  adminToast(`${ADMIN_TABLES[table].label} marked as test data`, 'success');
  loadData();
}

async function unmarkTest(table, id) {
  if (!ADMIN_TABLES[table]) return adminToast('Unknown table', 'error');
  const { data, error } = await sb.from(table).update({ is_test: false }).eq('id', id).select();
  if (error) return adminToast(`Unmark failed: ${error.message}`, 'error');
  if (!data || data.length === 0) return adminToast(`No row updated — RLS may be blocking. Check admin policies.`, 'error');
  adminToast(`${ADMIN_TABLES[table].label} cleared from test data`, 'success');
  loadData();
}

// Soft delete — sets deleted_at = now(). Hidden everywhere (incl. host
// console + guest app). FK cascade does NOT fire (the row is still there).
async function softDelete(table, id) {
  if (!ADMIN_TABLES[table]) return adminToast('Unknown table', 'error');
  const { data, error } = await sb.from(table).update({ deleted_at: new Date().toISOString() }).eq('id', id).select();
  if (error) return adminToast(`Soft delete failed: ${error.message}`, 'error');
  if (!data || data.length === 0) return adminToast(`No row updated — RLS may be blocking. Check admin policies.`, 'error');
  adminToast(`${ADMIN_TABLES[table].label} soft-deleted (recoverable)`, 'success');
  loadData();
}

async function restoreRow(table, id) {
  if (!ADMIN_TABLES[table]) return adminToast('Unknown table', 'error');
  const { data, error } = await sb.from(table).update({ deleted_at: null }).eq('id', id).select();
  if (error) return adminToast(`Restore failed: ${error.message}`, 'error');
  if (!data || data.length === 0) return adminToast(`No row updated — RLS may be blocking. Check admin policies.`, 'error');
  adminToast(`${ADMIN_TABLES[table].label} restored`, 'success');
  loadData();
}

// Purge modal — typed-confirm gate. Dangerous; CASCADE will fire so a
// purged property nukes its checkins/recos/rules/chat_messages.
let _pendingPurge = null;

function showPurgeModal(table, id, displayLabel) {
  if (!ADMIN_TABLES[table]) return adminToast('Unknown table', 'error');
  _pendingPurge = { table, id, displayLabel };

  const tableLabel = ADMIN_TABLES[table].label;
  let warning = `Permanent <strong>${tableLabel}</strong> deletion. This row will be removed from the database forever.`;
  if (table === 'properties') {
    warning += ` <strong>Cascade will also delete</strong> all check-ins, recommendations, rules, and chat messages for this property.`;
  } else if (table === 'checkins') {
    warning += ` Removes the check-in record. Linked analytics events stay (no FK).`;
  }

  document.getElementById('purgeWarning').innerHTML = warning;
  document.getElementById('purgeDetail').textContent = displayLabel;
  // The user must type the displayLabel itself to confirm — exact match,
  // case-sensitive — so it's hard to "muscle-memory" through.
  const confirmText = displayLabel.length > 60 ? displayLabel.slice(0, 60) + '…' : displayLabel;
  document.getElementById('purgeConfirmText').textContent = confirmText;
  document.getElementById('purgeInput').value = '';
  document.getElementById('purgeConfirmBtn').disabled = true;
  document.getElementById('purgeError').classList.remove('show');
  document.getElementById('purgeModal').classList.add('show');
  setTimeout(() => document.getElementById('purgeInput').focus(), 50);
}

function closePurgeModal() {
  document.getElementById('purgeModal').classList.remove('show');
  _pendingPurge = null;
}

function onPurgeInput() {
  if (!_pendingPurge) return;
  const expected = document.getElementById('purgeConfirmText').textContent;
  const got = document.getElementById('purgeInput').value;
  document.getElementById('purgeConfirmBtn').disabled = got !== expected;
}

async function executePurge() {
  if (!_pendingPurge) return;
  const { table, id } = _pendingPurge;
  const btn = document.getElementById('purgeConfirmBtn');
  btn.disabled = true;
  btn.textContent = 'Deleting…';
  const { error } = await sb.from(table).delete().eq('id', id);
  if (error) {
    document.getElementById('purgeError').textContent = error.message;
    document.getElementById('purgeError').classList.add('show');
    btn.textContent = 'Delete permanently';
    btn.disabled = false;
    return;
  }
  closePurgeModal();
  adminToast(`${ADMIN_TABLES[table].label} permanently deleted`, 'success');
  loadData();
}

// Bulk maintenance: purge any row that's been soft-deleted longer than N days.
async function bulkPurgeOld(table) {
  if (!ADMIN_TABLES[table]) return adminToast('Unknown table', 'error');
  const days = 30;
  const cutoff = new Date(Date.now() - days * 86400000).toISOString();
  // Count first so admin sees the impact before confirming.
  const { count, error: countErr } = await sb.from(table)
    .select('id', { count: 'exact', head: true })
    .lt('deleted_at', cutoff);
  if (countErr) return adminToast(`Count failed: ${countErr.message}`, 'error');
  if (!count) return adminToast(`No ${ADMIN_TABLES[table].label.toLowerCase()} rows older than ${days} days to purge.`);
  if (!window.confirm(`Permanently delete ${count} ${ADMIN_TABLES[table].label.toLowerCase()} row(s) that have been soft-deleted for more than ${days} days?\n\nThis CANNOT be undone. Cascades will fire.`)) return;
  const { error } = await sb.from(table).delete().lt('deleted_at', cutoff);
  if (error) return adminToast(`Purge failed: ${error.message}`, 'error');
  adminToast(`Purged ${count} old ${ADMIN_TABLES[table].label.toLowerCase()} row(s)`, 'success');
  loadData();
}

// Helper for inline-rendered action button cells. Returns HTML string with
// 3-4 buttons depending on row state.
function adminRowActions(table, row) {
  const id = row.id;
  if (!id) return '';
  const tbl = ADMIN_TABLES[table];
  if (!tbl) return '';
  const label = (tbl.identifier(row) || '?').replace(/'/g, "\\'").replace(/"/g, '&quot;');
  const isTest = !!row.is_test;
  const isDeleted = !!row.deleted_at;

  const parts = [];
  if (isDeleted) {
    parts.push(`<button class="admin-action-btn success" onclick="restoreRow('${table}','${id}')" title="Restore (clears deleted_at)">↩️</button>`);
  } else {
    if (isTest) {
      parts.push(`<button class="admin-action-btn" onclick="unmarkTest('${table}','${id}')" title="Unmark as test data">🧪✓</button>`);
    } else {
      parts.push(`<button class="admin-action-btn warn" onclick="markTest('${table}','${id}')" title="Mark as test data (hides from analytics)">🧪</button>`);
    }
    parts.push(`<button class="admin-action-btn warn" onclick="softDelete('${table}','${id}')" title="Soft delete (recoverable)">🗑</button>`);
  }
  parts.push(`<button class="admin-action-btn danger" onclick="showPurgeModal('${table}','${id}','${label}')" title="Permanent delete (cascade)">💀</button>`);
  return `<div class="admin-actions">${parts.join('')}</div>`;
}

// Helper for row-state CSS class on <tr>.
function adminRowClass(row) {
  const cls = [];
  if (row.is_test)    cls.push('row-test');
  if (row.deleted_at) cls.push('row-deleted');
  return cls.join(' ');
}

async function loadData() {
  const days = parseInt(document.getElementById('timeRange').value);
  const since = new Date(Date.now() - days * 86400000).toISOString();

  document.getElementById('content').innerHTML = '<div class="loading">Loading analytics…</div>';

  // Build hidden-aware query helpers. If `showHidden` is on, no filters are
  // added — we get everything. Otherwise filter out test + soft-deleted rows.
  const applyHiddenFilter = (q) =>
    showHidden ? q : q.eq('is_test', false).is('deleted_at', null);

  const [eventsRes, propsRes, checkinsRes, recosRes] = await Promise.all([
    applyHiddenFilter(sb.from('analytics_events').select('*').gte('created_at', since)).order('created_at', { ascending: false }).limit(10000),
    applyHiddenFilter(sb.from('properties').select('*')).order('name'),
    applyHiddenFilter(sb.from('checkins').select('id, property_id, booking_code, surname, name, guest_type, submitted_at, is_test, deleted_at')),
    applyHiddenFilter(sb.from('recommendations').select('*')).order('sort_order'),
  ]);

  if (eventsRes.error) { document.getElementById('content').innerHTML = `<div class="loading">Error: ${eventsRes.error.message}</div>`; return; }

  allEvents = eventsRes.data || [];
  allProperties = propsRes.data || [];
  allRecommendations = recosRes.data || [];
  allCheckins = checkinsRes.data || [];

  // Count check-ins per property
  const checkinCounts = {};
  allCheckins.forEach(c => { checkinCounts[c.property_id] = (checkinCounts[c.property_id] || 0) + 1; });
  allProperties.forEach(p => { p._checkin_count = checkinCounts[p.id] || 0; });

  // Populate user dropdown
  const users = [...new Set(allEvents.filter(e => e.user_email).map(e => e.user_email))].sort();
  const sel = document.getElementById('userFilter');
  const current = sel.value;
  sel.innerHTML = '<option value="all">All Users (' + users.length + ')</option>' +
    users.map(u => `<option value="${u}" ${u===current?'selected':''}>${u}</option>`).join('');

  renderView();
}

function getFilteredEvents() {
  const user = document.getElementById('userFilter').value;
  if (user === 'all') return allEvents;
  return allEvents.filter(e => e.user_email === user);
}

/* ══════════════════════════════════════
   EXPORT
══════════════════════════════════════ */
function exportData(format) {
  const events = getFilteredEvents();
  if (events.length === 0) return;

  const user = document.getElementById('userFilter').value;
  const prefix = user === 'all' ? 'wbnb_analytics' : `wbnb_${user.split('@')[0]}`;
  const date = new Date().toISOString().slice(0,10);

  if (format === 'csv') {
    const headers = ['created_at','event_type','user_email','user_id','property_id','session_id','event_data'];
    const rows = events.map(e => [
      e.created_at,
      e.event_type,
      e.user_email || '',
      e.user_id || '',
      e.property_id || '',
      e.session_id || '',
      JSON.stringify(e.event_data || {})
    ].map(v => `"${String(v).replace(/"/g,'""')}"`).join(','));
    const csv = '\uFEFF' + [headers.join(','), ...rows].join('\n');
    downloadFile(`${prefix}_${date}.csv`, csv, 'text/csv');
  } else {
    const json = JSON.stringify(events, null, 2);
    downloadFile(`${prefix}_${date}.json`, json, 'application/json');
  }
}

function downloadFile(name, content, type) {
  const blob = new Blob([content], { type: type + ';charset=utf-8' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = name;
  a.click();
  URL.revokeObjectURL(a.href);
}

/* ══════════════════════════════════════
   RENDER
══════════════════════════════════════ */
function renderView() {
  const events = getFilteredEvents();

    document.getElementById('content').innerHTML = '<div class="loading">No events for this selection.</div>';

  const sessionEnds = events.filter(e => e.event_type === 'session_end');

  const signups = events.filter(e => e.event_type === 'signup').length;
  const saves = {
    property: events.filter(e => e.event_type === 'save_property').length,
    rules: events.filter(e => e.event_type === 'save_rules').length,

    istat: events.filter(e => e.event_type === 'export_istat').length,

  const totalExports = exports.alloggiati + exports.dms + exports.csv + exports.istat;
  const bookings = events.filter(e => e.event_type === 'generate_booking').length;
  const deletes = events.filter(e => e.event_type === 'delete_checkin' || e.event_type === 'delete_all_checkins').length;

  // Panel views
  const panelViews = {};
  events.filter(e => e.event_type === 'panel_view').forEach(e => {
    const p = e.event_data?.panel || 'unknown';
    panelViews[p] = (panelViews[p] || 0) + 1;
  });

  // Panel times
  const panelTimes = {};
  sessionEnds.forEach(e => {
    const pt = e.event_data?.panel_times || {};
    Object.entries(pt).forEach(([k, v]) => { panelTimes[k] = (panelTimes[k] || 0) + v; });
  });

  // Daily activity
  const dailyCounts = {};
  events.forEach(e => {
    const day = e.created_at.slice(0, 10);
    dailyCounts[day] = (dailyCounts[day] || 0) + 1;
  });

  // Feature usage bar chart
  const featureUsage = [
    { label: 'Panel Navigation', count: events.filter(e => e.event_type === 'panel_view').length, color: 'var(--ink-soft)' },
    { label: 'Save Property', count: saves.property, color: 'var(--blue)' },
    { label: 'Save Rules', count: saves.rules, color: 'var(--blue)' },
    { label: 'Save Recommendations', count: saves.recos, color: 'var(--blue)' },
    { label: 'Export Alloggiati', count: exports.alloggiati, color: 'var(--warm)' },
    { label: 'Export DMS', count: exports.dms, color: 'var(--warm)' },
    { label: 'Export CSV', count: exports.csv, color: 'var(--warm)' },
    { label: 'Export ISTAT', count: exports.istat, color: 'var(--warm)' },
    { label: 'Generate Booking', count: bookings, color: 'var(--green)' },
    { label: 'Delete Records', count: deletes, color: 'var(--red)' },
  ].filter(f => f.count > 0).sort((a, b) => b.count - a.count);
  const maxFeature = Math.max(...featureUsage.map(f => f.count), 1);

  // Panel time bar chart
  const panelTimeEntries = Object.entries(panelTimes).sort((a, b) => b[1] - a[1]);
  const maxPanelTime = Math.max(...panelTimeEntries.map(e => e[1]), 1);
  const panelLabels = { dashboard:'Dashboard', property:'Property', rules:'Rules', recos:'Recommendations', checkins:'Check-ins', export:'Export', qrlink:'QR & Link' };

  const fmtSec = (s) => s < 60 ? `${s}s` : s < 3600 ? `${Math.floor(s/60)}m ${s%60}s` : `${Math.floor(s/3600)}h ${Math.floor((s%3600)/60)}m`;

  // Per-user table (only in "all" view)
  const userStats = {};
  allEvents.forEach(e => {
    const u = e.user_email || 'unknown';
    if (!userStats[u]) userStats[u] = { sessions: new Set(), events: 0, logins: 0, saves: 0, exports: 0, bookings: 0, firstSeen: e.created_at, lastSeen: e.created_at };
    userStats[u].events++;
    if (e.session_id) userStats[u].sessions.add(e.session_id);
    if (e.event_type === 'login' || e.event_type === 'session_start') userStats[u].logins++;
    if (e.event_type.startsWith('save_')) userStats[u].saves++;
    if (e.event_type.startsWith('export_')) userStats[u].exports++;
    if (e.event_type === 'generate_booking') userStats[u].bookings++;
    if (e.created_at < userStats[u].firstSeen) userStats[u].firstSeen = e.created_at;
    if (e.created_at > userStats[u].lastSeen) userStats[u].lastSeen = e.created_at;
  });

  // Daily activity chart (simple text sparkline)
  const sortedDays = Object.entries(dailyCounts).sort((a,b) => a[0].localeCompare(b[0]));
  const maxDay = Math.max(...sortedDays.map(d => d[1]), 1);

  // ── RENDER ──
  let html = '';

  // User header if filtered
  if (isUserView) {
    const us = userStats[selectedUser];
    html += `
      <div style="background:var(--white);border:1px solid var(--border);border-radius:var(--radius);padding:18px 22px;box-shadow:var(--shadow);margin-bottom:20px;display:flex;align-items:center;gap:16px;">
        <div style="width:48px;height:48px;border-radius:50%;background:var(--warm);color:#fff;display:flex;align-items:center;justify-content:center;font-size:1.2rem;font-weight:600;flex-shrink:0;">${selectedUser.charAt(0).toUpperCase()}</div>
        <div style="flex:1;">
          <div style="font-size:1.05rem;font-weight:600;color:var(--ink);">${selectedUser}</div>
          <div style="font-size:0.78rem;color:var(--ink-soft);margin-top:2px;">
            ${us ? `First seen: ${new Date(us.firstSeen).toLocaleDateString()} · Last active: ${new Date(us.lastSeen).toLocaleString()}` : ''}
          </div>
        </div>
        <button class="refresh-btn" onclick="document.getElementById('userFilter').value='all';renderView();" style="background:var(--cream-3);color:var(--ink);">← All Users</button>
      </div>`;
  }

  // Stats
  html += `<div class="section-title">Overview${isUserView ? ' · ' + selectedUser.split('@')[0] : ''}</div>
    <div class="stats">
      ${!isUserView ? `<div class="stat">
        <div class="stat-label">Total Users</div>
        <div class="stat-val blue">${uniqueUsers.length}</div>
        <div class="stat-sub">${signups} sign-up${signups !== 1 ? 's' : ''}</div>
      </div>` : ''}

        <div class="stat-label">Sessions</div>
        <div class="stat-val">${sessions.length}</div>
        <div class="stat-sub">${logins} login${logins !== 1 ? 's' : ''}</div>

      <div class="stat">
        <div class="stat-label">Avg Session</div>
        <div class="stat-val green">${fmtSec(avgDuration)}</div>
        <div class="stat-sub">Total: ${fmtSec(totalDuration)}</div>
      </div>
      <div class="stat">
        <div class="stat-label">Total Events</div>
        <div class="stat-val">${events.length}</div>
        <div class="stat-sub">${Object.keys(dailyCounts).length} active day${Object.keys(dailyCounts).length !== 1 ? 's' : ''}</div>
      </div>
      <div class="stat">
        <div class="stat-label">Saves</div>
        <div class="stat-val blue">${saves.property + saves.rules + saves.recos}</div>
        <div class="stat-sub">Property: ${saves.property} · Rules: ${saves.rules} · Recos: ${saves.recos}</div>
      </div>
      <div class="stat">
        <div class="stat-label">Exports</div>
        <div class="stat-val amber">${totalExports}</div>
        <div class="stat-sub">Alloggiati: ${exports.alloggiati} · DMS: ${exports.dms} · CSV: ${exports.csv}</div>
      </div>
      <div class="stat">
        <div class="stat-label">Booking Links</div>
        <div class="stat-val green">${bookings}</div>
        <div class="stat-sub">generated</div>
      </div>
    </div>`;

  // ══════════════════════════════════════
  // GUEST ACTIVITY — aggregated from guest_* events
  // Always renders when any guest event exists in the current filter.
  // ══════════════════════════════════════
  const guestEvents = events.filter(e => e.event_type && e.event_type.startsWith('guest_'));
  if (guestEvents.length > 0) {
    // Session-level aggregation for funnel
    const gSessions = {};
    for (const e of guestEvents) {
      const sid = e.session_id || '_nosid_' + e.created_at;
      if (!gSessions[sid]) gSessions[sid] = { evs: {}, prop: e.property_id, langs: {} };
      gSessions[sid].evs[e.event_type] = (gSessions[sid].evs[e.event_type] || 0) + 1;
      const el = e.event_data && e.event_data.lang;
      if (el) gSessions[sid].langs[el] = (gSessions[sid].langs[el] || 0) + 1;
    }
    const gSessList = Object.values(gSessions);
    const gOpened    = gSessList.filter(s => s.evs['guest_link_opened']).length;
    const gStarted   = gSessList.filter(s => s.evs['guest_checkin_started']).length;
    const gCompleted = gSessList.filter(s => s.evs['guest_checkin_completed']).length;
    const gOpenedShow    = Math.max(gOpened, gStarted, gCompleted, gSessList.length);
    const gStartedShow   = Math.max(gStarted, gCompleted);
    const conversionPct  = gOpenedShow > 0 ? Math.round((gCompleted / gOpenedShow) * 100) : 0;
    const startPct       = gOpenedShow > 0 ? Math.round((gStartedShow / gOpenedShow) * 100) : 0;

    // Per-property rollup
    const propRoll = {};
    gSessList.forEach(s => {
      const pid = s.prop || 'unknown';

    const propLookup = {};

      .map(([pid, r]) => ({

      if (e.event_type === 'guest_reco_clicked')    featureSession.reco_click.add(sid);

      { label: 'Language switched',    n: featureSession.lang_switch.size, color: 'var(--ink-soft)' },
    ];
    const featMax = Math.max(...featureRows.map(f => f.n), 1);

    // Language split across sessions (dominant lang per session)
    const langSplit = {};
    gSessList.forEach(s => {
      const top = Object.entries(s.langs).sort((a, b) => b[1] - a[1])[0];
      if (top) langSplit[top[0]] = (langSplit[top[0]] || 0) + 1;
    });
    const langTotal = Object.values(langSplit).reduce((a, b) => a + b, 0);

    html += `<div class="section-title">Guest Activity — Cross-property</div>
      <div class="stats">
        <div class="stat">
          <div class="stat-label">Guest Sessions</div>
          <div class="stat-val blue">${gSessList.length}</div>
          <div class="stat-sub">${Object.keys(propRoll).length} propert${Object.keys(propRoll).length === 1 ? 'y' : 'ies'}</div>
        </div>
        <div class="stat">
          <div class="stat-label">Check-ins Started</div>
          <div class="stat-val">${gStartedShow}</div>
          <div class="stat-sub">${startPct}% of opens</div>
        </div>
        <div class="stat">
          <div class="stat-label">Check-ins Completed</div>
          <div class="stat-val green">${gCompleted}</div>
          <div class="stat-sub">${conversionPct}% conversion</div>
        </div>
        <div class="stat">
          <div class="stat-label">Chat Messages</div>
          <div class="stat-val">${guestEvents.filter(e => e.event_type === 'guest_chat_message').length}</div>
          <div class="stat-sub">${featureSession.chat.size} session${featureSession.chat.size !== 1 ? 's' : ''}</div>
        </div>
        <div class="stat">
          <div class="stat-label">Reco Clicks</div>
          <div class="stat-val amber">${guestEvents.filter(e => e.event_type === 'guest_reco_clicked').length}</div>
          <div class="stat-sub">${featureSession.reco_click.size} session${featureSession.reco_click.size !== 1 ? 's' : ''}</div>
        </div>
        <div class="stat">
          <div class="stat-label">Languages</div>
          <div class="stat-val">${Object.keys(langSplit).length}</div>
          <div class="stat-sub">${Object.entries(langSplit).sort((a,b) => b[1] - a[1]).map(([k, v]) => `${k.toUpperCase()}: ${langTotal > 0 ? Math.round(v / langTotal * 100) : 0}%`).join(' · ')}</div>
        </div>
      </div>`;

    // Feature adoption bars
    html += `<div class="section-title">Guest Feature Adoption</div>
      <div style="background:var(--white);border:1px solid var(--border);border-radius:var(--radius);padding:16px 18px;box-shadow:var(--shadow);">
        <div class="bar-chart">
          ${featureRows.map(f => `
            <div class="bar-row">
              <div class="bar-label">${f.label}</div>
              <div class="bar-track">
                <div class="bar-fill" style="width:${Math.round(f.n / featMax * 100)}%;background:${f.color};"></div>
                <div class="bar-count">${f.n} · ${pctOf(f.n)}%</div>
              </div>
            </div>
          `).join('')}
        </div>
      </div>`;

    // Per-property table
    if (propRows.length > 0) {
      html += `<div class="section-title">Per-property Guest Activity</div>
        <div style="background:var(--white);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;box-shadow:var(--shadow);">
          <table style="width:100%;border-collapse:collapse;">
            <thead>
              <tr style="background:var(--cream-2);">
                <th style="padding:10px 14px;text-align:left;font-size:0.7rem;color:var(--ink-soft);border-bottom:1px solid var(--border);">Property</th>
                <th style="padding:10px 14px;text-align:right;font-size:0.7rem;color:var(--ink-soft);border-bottom:1px solid var(--border);">Opens</th>
                <th style="padding:10px 14px;text-align:right;font-size:0.7rem;color:var(--ink-soft);border-bottom:1px solid var(--border);">Started</th>
                <th style="padding:10px 14px;text-align:right;font-size:0.7rem;color:var(--ink-soft);border-bottom:1px solid var(--border);">Completed</th>
                <th style="padding:10px 14px;text-align:right;font-size:0.7rem;color:var(--ink-soft);border-bottom:1px solid var(--border);">Conversion</th>
              </tr>
            </thead>
            <tbody>
              ${propRows.map(r => `
                <tr>
                  <td style="padding:10px 14px;font-size:0.82rem;color:var(--ink);border-bottom:1px solid var(--border);">${r.name}</td>
                  <td style="padding:10px 14px;font-size:0.82rem;color:var(--ink);text-align:right;border-bottom:1px solid var(--border);">${r.opened}</td>
                  <td style="padding:10px 14px;font-size:0.82rem;color:var(--ink);text-align:right;border-bottom:1px solid var(--border);">${r.started}</td>
                  <td style="padding:10px 14px;font-size:0.82rem;color:var(--green);font-weight:500;text-align:right;border-bottom:1px solid var(--border);">${r.completed}</td>
                  <td style="padding:10px 14px;font-size:0.82rem;color:${r.rate >= 70 ? 'var(--green)' : r.rate >= 40 ? 'var(--amber)' : 'var(--red)'};font-weight:500;text-align:right;border-bottom:1px solid var(--border);">${r.rate}%</td>
                </tr>
              `).join('')}
            </tbody>
          </table>
        </div>`;
    }
  }

  // Daily activity
  if (sortedDays.length > 1) {
    html += `<div class="section-title">Daily Activity</div>
      <div style="background:var(--white);border:1px solid var(--border);border-radius:var(--radius);padding:16px 18px;box-shadow:var(--shadow);">
        <div style="display:flex;align-items:flex-end;gap:2px;height:60px;">
          ${sortedDays.slice(-30).map(([day, count]) => {
            const h = Math.max(4, Math.round(count / maxDay * 56));
            return `<div title="${day}: ${count} events" style="flex:1;height:${h}px;background:var(--warm);border-radius:2px 2px 0 0;min-width:4px;opacity:${0.4 + (count/maxDay)*0.6};cursor:pointer;"></div>`;
          }).join('')}
        </div>
        <div style="display:flex;justify-content:space-between;margin-top:6px;font-size:0.6rem;color:var(--ink-soft);">
          <span>${sortedDays.slice(-30)[0]?.[0] || ''}</span>
          <span>${sortedDays[sortedDays.length-1]?.[0] || ''}</span>
        </div>
      </div>`;
  }

  // Feature usage
  if (featureUsage.length > 0) {
    html += `<div class="section-title">Feature Usage</div>
      <div style="background:var(--white);border:1px solid var(--border);border-radius:var(--radius);padding:16px 18px;box-shadow:var(--shadow);">
        <div class="bar-chart">
          ${featureUsage.map(f => `
            <div class="bar-row">
              <div class="bar-label">${f.label}</div>
              <div class="bar-track">
                <div class="bar-fill" style="width:${Math.round(f.count/maxFeature*100)}%;background:${f.color};"></div>
                <div class="bar-count">${f.count}</div>
              </div>
            </div>
          `).join('')}
        </div>
      </div>`;
  }

  // Panel time
  if (panelTimeEntries.length > 0) {
    html += `<div class="section-title">Time Spent per Section</div>
      <div style="background:var(--white);border:1px solid var(--border);border-radius:var(--radius);padding:16px 18px;box-shadow:var(--shadow);">
        <div class="bar-chart">
          ${panelTimeEntries.map(([k, v]) => `
            <div class="bar-row">
              <div class="bar-label">${panelLabels[k] || k}</div>
              <div class="bar-track">
                <div class="bar-fill" style="width:${Math.round(v/maxPanelTime*100)}%;background:var(--blue);"></div>
                <div class="bar-count">${fmtSec(v)}</div>
              </div>
            </div>
          `).join('')}
        </div>
      </div>`;
  }

  // ── Hosts & Properties (merged table) ──
  if (!isUserView) {
    const userIdToEmail = {};
    events.forEach(e => { if (e.user_id && e.user_email) userIdToEmail[e.user_id] = e.user_email; });

    // ══════════════════════════════════════════════════════════════════════
    // HOST PERFORMANCE — aggregate guest activity per host (across all their
    // properties) so admin can compare hosts apples-to-apples and surface
    // upsell / onboarding / partnership opportunities.
    // ══════════════════════════════════════════════════════════════════════

    // Build property → host email map. Falls back to scanning events for
    // property_id ↔ user_email co-occurrence so hosts who haven't signed in
    // recently still resolve.
    const propToEmail = {};
    allProperties.forEach(p => {
      if (p.owner_id && userIdToEmail[p.owner_id]) propToEmail[p.id] = userIdToEmail[p.owner_id];
    });
    // Fallback: any event with both property_id and user_email
    events.forEach(e => {
      if (e.property_id && e.user_email && !propToEmail[e.property_id]) {
        propToEmail[e.property_id] = e.user_email;
      }
    });

    // Group guest events by host email (host = owner of the property the
    // guest event happened on). Anonymous guest events without a resolvable
    // host are bucketed under '_unattributed'.
    const hostGuestStats = {}; // email → metrics
    function ensureHost(email) {
      if (!hostGuestStats[email]) {
        hostGuestStats[email] = {
          email, properties: new Set(), sessions: new Set(),
          opens: 0, started: 0, completed: 0,
          recoClicks: 0, chatMessages: 0, chatEscalations: 0,
          docScans: 0, hostReplies: 0, langs: {},
        };
      }
      return hostGuestStats[email];
    }
    // Pre-register every host that owns a property (even if no guest activity)
    Object.values(propToEmail).forEach(email => ensureHost(email));

    guestEvents.forEach(e => {
      const email = propToEmail[e.property_id] || '_unattributed';
      const h = ensureHost(email);
      if (e.property_id) h.properties.add(e.property_id);
      if (e.session_id)  h.sessions.add(e.session_id);
      if (e.event_type === 'guest_link_opened')        h.opens++;
      if (e.event_type === 'guest_checkin_started')    h.started++;
      if (e.event_type === 'guest_checkin_completed')  h.completed++;
      if (e.event_type === 'guest_reco_clicked')       h.recoClicks++;
      if (e.event_type === 'guest_chat_message')       h.chatMessages++;
      if (e.event_type === 'guest_chat_escalated')     h.chatEscalations++;
      if (e.event_type === 'guest_doc_scanned')        h.docScans++;
      const lng = e.event_data && e.event_data.lang;
      if (lng) h.langs[lng] = (h.langs[lng] || 0) + 1;
    });

    // Build leaderboard rows. Synthetic "engagement score" = weighted blend
    // of conversion + reco activity + chat — captures hosts whose guests
    // actually use the app vs hosts whose guests just open the link.
    const hostRows = Object.values(hostGuestStats)
      .filter(h => h.email !== '_unattributed' || h.sessions.size > 0)
      .map(h => {
        const sessions = h.sessions.size;
        const completionRate = h.opens > 0 ? Math.round(h.completed / h.opens * 100) : 0;
        const recoRate       = sessions > 0 ? Math.round(h.recoClicks / sessions * 100) : 0;
        const chatRate       = sessions > 0 ? Math.round(h.chatMessages / sessions * 100) : 0;
        // Engagement score: conversion (50pts) + reco use (25pts) + chat (25pts).
        // Caps each component so a single chatty session can't dominate.
        const score = Math.round(
          (completionRate * 0.5) +
          Math.min(50, recoRate) * 0.5 +
          Math.min(50, chatRate) * 0.5
        );
        const tier = score >= 60 ? 'gold' : score >= 35 ? 'silver' : score >= 15 ? 'bronze' : 'dormant';
        const dominantLang = Object.entries(h.langs).sort((a, b) => b[1] - a[1])[0];
        return {
          email: h.email,
          properties: h.properties.size || (h.email !== '_unattributed' ? allProperties.filter(p => propToEmail[p.id] === h.email).length : 0),
          sessions, completed: h.completed, completionRate,
          recoClicks: h.recoClicks, recoRate,
          chatMessages: h.chatMessages, chatEscalations: h.chatEscalations, chatRate,
          docScans: h.docScans,
          score, tier,
          dominantLang: dominantLang ? dominantLang[0].toUpperCase() : '—',
        };
      });

    // Sort: engagement score desc; ties → sessions desc.
    hostRows.sort((a, b) => (b.score - a.score) || (b.sessions - a.sessions));

    if (hostRows.length > 0) {
      const tierColor = { gold: '#C9A96E', silver: '#8B9DAB', bronze: '#B07A4B', dormant: '#A0978C' };
      const tierLabel = { gold: '🥇 Gold', silver: '🥈 Silver', bronze: '🥉 Bronze', dormant: '💤 Dormant' };

      html += `<div class="section-title">Host Performance Leaderboard (${hostRows.length})</div>
        <div style="font-size:0.78rem;color:var(--ink-soft);margin-bottom:10px;">
          Engagement score blends check-in completion + recommendation usage + chat activity. Use it to spot top performers, partnership candidates, and hosts who need onboarding help.
        </div>
        <div style="overflow-x:auto;margin-bottom:10px;">
        <table class="data-table" style="width:100%;min-width:880px;">
          <thead><tr>
            <th>#</th><th>Host</th><th>Tier</th><th style="text-align:right;">Score</th>
            <th style="text-align:right;">Props</th><th style="text-align:right;">Sessions</th>
            <th style="text-align:right;">Compl.</th><th style="text-align:right;">Reco clicks</th>
            <th style="text-align:right;">Chat msgs</th><th style="text-align:right;">Help reqs</th>
            <th>Lang</th>
          </tr></thead>
          <tbody>
            ${hostRows.map((r, i) => {
              const isUnatt = r.email === '_unattributed';
              const display = isUnatt ? '<em style="color:var(--ink-soft)">Unattributed</em>' : `<strong>${r.email.split('@')[0]}</strong><br><span style="font-size:0.65rem;color:var(--ink-soft)">${r.email}</span>`;
              return `<tr>
                <td style="font-weight:600;color:var(--ink-soft);">${i + 1}</td>
                <td>${display}</td>
                <td><span style="display:inline-block;padding:2px 8px;border-radius:10px;background:${tierColor[r.tier]}22;color:${tierColor[r.tier]};font-size:0.7rem;font-weight:600;white-space:nowrap;">${tierLabel[r.tier]}</span></td>
                <td style="text-align:right;font-weight:600;font-family:'Playfair Display',serif;font-size:1rem;color:${r.score >= 60 ? 'var(--green)' : r.score >= 35 ? 'var(--amber)' : 'var(--ink-soft)'};">${r.score}</td>
                <td style="text-align:right;">${r.properties}</td>
                <td style="text-align:right;">${r.sessions}</td>
                <td style="text-align:right;">${r.completed} <span style="color:var(--ink-soft);font-size:0.7rem;">(${r.completionRate}%)</span></td>
                <td style="text-align:right;${r.recoClicks > 0 ? 'color:var(--warm);font-weight:500;' : ''}">${r.recoClicks}</td>
                <td style="text-align:right;${r.chatMessages > 0 ? 'color:var(--blue);font-weight:500;' : ''}">${r.chatMessages}</td>
                <td style="text-align:right;${r.chatEscalations > 0 ? 'color:var(--red);font-weight:500;' : ''}">${r.chatEscalations}</td>
                <td style="font-size:0.72rem;color:var(--ink-soft);">${r.dominantLang}</td>
              </tr>`;
            }).join('')}
          </tbody>
        </table></div>`;

      // ══════════════════════════════════════════════════════════════════════
      // BUSINESS OPPORTUNITIES — derived signals for action
      // ══════════════════════════════════════════════════════════════════════
      const namedHosts = hostRows.filter(r => r.email !== '_unattributed');
      const goldHosts    = namedHosts.filter(r => r.tier === 'gold');
      const silverHosts  = namedHosts.filter(r => r.tier === 'silver');
      const dormantHosts = namedHosts.filter(r => r.tier === 'dormant' && r.sessions > 0);
      // High traffic, low conversion = "leaving money on the table"
      const leakyHosts = namedHosts.filter(r => r.sessions >= 5 && r.completionRate < 40 && r.completed === 0);
      // High help-request rate = candidate for managed-concierge upsell
      const helpHeavyHosts = namedHosts.filter(r => r.sessions >= 3 && (r.chatEscalations / Math.max(1, r.sessions)) >= 0.4);
      // Setup-incomplete properties (re-use existing setupScore from the table below)
      const incompleteProps = allProperties.filter(p => {
        const score = [p.wifi_name, p.host_names, p.host_phone, p.address, p.cir_code].filter(Boolean).length;
        return score < 4;
      });

      const oppCard = (icon, title, count, body, color) => `
        <div style="background:var(--white);border:1px solid var(--border);border-left:3px solid ${color};border-radius:var(--radius);padding:12px 14px;box-shadow:var(--shadow);">
          <div style="display:flex;align-items:center;gap:8px;margin-bottom:6px;">
            <span style="font-size:1.1rem;">${icon}</span>
            <span style="font-size:0.7rem;letter-spacing:0.1em;text-transform:uppercase;color:var(--ink-2);font-weight:600;">${title}</span>
            <span style="margin-left:auto;font-family:'Playfair Display',serif;font-size:1.3rem;color:${color};font-weight:600;line-height:1;">${count}</span>
          </div>
          <div style="font-size:0.76rem;color:var(--ink-soft);line-height:1.4;">${body}</div>
        </div>`;

      html += `<div class="section-title">Business Opportunities</div>
        <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:10px;margin-bottom:10px;">
          ${oppCard('🥇', 'Top hosts (premium tier)', goldHosts.length,
            `High-engagement hosts — candidates for "Curator" badge, custom AI voice, featured listings. ${goldHosts.slice(0,3).map(h => h.email.split('@')[0]).join(', ')}${goldHosts.length > 3 ? '…' : ''}`, '#C9A96E')}
          ${oppCard('💡', 'Leaky funnel', leakyHosts.length,
            `Traffic but no completed check-ins — listing optimization or photo audit could unlock revenue. ${leakyHosts.slice(0,3).map(h => h.email.split('@')[0]).join(', ')}${leakyHosts.length > 3 ? '…' : ''}`, 'var(--amber)')}
          ${oppCard('💬', 'Concierge upsell', helpHeavyHosts.length,
            `Guests frequently asking for human help — ideal for managed-concierge tier (paid human-in-the-loop). ${helpHeavyHosts.slice(0,3).map(h => h.email.split('@')[0]).join(', ')}${helpHeavyHosts.length > 3 ? '…' : ''}`, 'var(--blue)')}
          ${oppCard('🛠️', 'Onboarding outreach', incompleteProps.length,
            `Properties with &lt;80% setup completion — automated email or 1:1 onboarding reduces churn risk.`, 'var(--red)')}
          ${oppCard('💤', 'Re-engagement', dormantHosts.length,
            `Active hosts whose guests barely engage with the app — needs hands-on help or product education.`, '#A0978C')}
          ${oppCard('🎯', 'Silver hosts (mid-funnel)', silverHosts.length,
            `Solid hosts with room to grow — small nudges (more recos, better welcome message) could promote them to Gold.`, '#8B9DAB')}
        </div>`;

      // ══════════════════════════════════════════════════════════════════════
      // ALL RECOMMENDATIONS REGISTRY — every reco entered by every host,
      // joined with guest click events. Shows recos with zero clicks too,
      // so admin can spot dead inventory and high-performing entries alike.
      // Filterable + sortable + searchable — this is the partnership pipeline.
      // ══════════════════════════════════════════════════════════════════════

      // Build click map: keyed by (property_id|name) so different hosts
      // recommending the same place name don't get conflated. Matching is
      // exact-name within property — same way it gets clicked from the app.
      const clickMap = {}; // "propId|name" → { count, lastClick }
      const recoEvents = guestEvents.filter(e => e.event_type === 'guest_reco_clicked');
      recoEvents.forEach(e => {
        const name = (e.event_data && e.event_data.name) || '';
        if (!name || !e.property_id) return;
        const key = e.property_id + '|' + name;
        if (!clickMap[key]) clickMap[key] = { count: 0, lastClick: e.created_at };
        clickMap[key].count++;
        if (e.created_at > clickMap[key].lastClick) clickMap[key].lastClick = e.created_at;
      });

      // Cross-host: same name across properties → "also recommended by" count
      const nameToHosts = {};
      allRecommendations.forEach(r => {
        if (!r.name) return;
        if (!nameToHosts[r.name]) nameToHosts[r.name] = new Set();
        const email = propToEmail[r.property_id] || '_unknown';
        nameToHosts[r.name].add(email);
      });

      // Build registry rows from recommendations table (so zero-click recos
      // appear too), enriched with click data + host attribution.
      const propLookupName = {};
      allProperties.forEach(p => { propLookupName[p.id] = p.name || p.id.slice(0, 8); });

      const registryRows = allRecommendations.map(r => {
        const key = r.property_id + '|' + r.name;
        const click = clickMap[key] || { count: 0, lastClick: null };
        const hostEmail = propToEmail[r.property_id] || null;
        const crossHostCount = (nameToHosts[r.name] && nameToHosts[r.name].size) || 1;
        return {
          id: r.id,
          name: r.name || '—',
          category: r.category || '',
          desc: r.desc_en || r.desc_it || '',
          address: r.address || '',
          tags: r.tags || '',
          propertyId: r.property_id,
          propertyName: propLookupName[r.property_id] || '—',
          hostEmail,
          hostShort: hostEmail ? hostEmail.split('@')[0] : null,
          clicks: click.count,
          lastClick: click.lastClick,
          crossHostCount,
          // Pass through state flags so the renderer can show the right
          // action buttons + apply row styling.
          is_test:    !!r.is_test,
          deleted_at: r.deleted_at || null,
        };
      });

      const totalRecos = registryRows.length;
      const recosWithClicks = registryRows.filter(r => r.clicks > 0).length;
      const totalClicks = registryRows.reduce((s, r) => s + r.clicks, 0);
      const deadRecos = registryRows.filter(r => r.clicks === 0).length;
      const uniqueVenues = new Set(registryRows.map(r => r.name.toLowerCase().trim())).size;
      // Click-through-rate proxy: clicks per recommendation
      const avgClicks = totalRecos > 0 ? (totalClicks / totalRecos).toFixed(1) : '0';

      // Stash for filter/sort handlers (hoisted to window for inline onchange)
      window._recoRegistry = registryRows;

      // Build category dropdown options
      const allCats = [...new Set(registryRows.map(r => r.category).filter(Boolean))].sort();
      // Build host dropdown options
      const allHostsInRegistry = [...new Set(registryRows.map(r => r.hostEmail).filter(Boolean))].sort();

      html += `<div class="section-title">All Recommendations Registry (${totalRecos})</div>
        <div style="font-size:0.78rem;color:var(--ink-soft);margin-bottom:10px;">
          Every recommendation entered by every host — joined with guest click data. Zero-click rows are dead inventory; high-click cross-host rows are partnership candidates. Filter, sort, and search to dig in.
        </div>
        <div class="stats" style="margin-bottom:14px;">
          <div class="stat"><div class="stat-label">Total recos</div><div class="stat-val">${totalRecos}</div><div class="stat-sub">${uniqueVenues} unique venues</div></div>
          <div class="stat"><div class="stat-label">Total clicks</div><div class="stat-val amber">${totalClicks}</div><div class="stat-sub">${avgClicks} avg per reco</div></div>
          <div class="stat"><div class="stat-label">Recos with clicks</div><div class="stat-val green">${recosWithClicks}</div><div class="stat-sub">${totalRecos > 0 ? Math.round(recosWithClicks / totalRecos * 100) : 0}% of inventory</div></div>
          <div class="stat"><div class="stat-label">Dead inventory</div><div class="stat-val red">${deadRecos}</div><div class="stat-sub">zero-click recos</div></div>
        </div>
        <div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:10px;align-items:center;">
          <input id="recoSearch" type="text" placeholder="Search venue, description, address…" oninput="renderRecoRegistry()"
                 style="flex:1;min-width:200px;padding:8px 12px;border:1px solid var(--border);border-radius:6px;font-size:0.85rem;font-family:'DM Sans',sans-serif;">
          <select id="recoCatFilter" onchange="renderRecoRegistry()" style="padding:8px 10px;border:1px solid var(--border);border-radius:6px;font-size:0.82rem;font-family:'DM Sans',sans-serif;">
            <option value="">All categories</option>
            ${allCats.map(c => `<option value="${c}">${c}</option>`).join('')}
          </select>
          <select id="recoHostFilter" onchange="renderRecoRegistry()" style="padding:8px 10px;border:1px solid var(--border);border-radius:6px;font-size:0.82rem;font-family:'DM Sans',sans-serif;max-width:220px;">
            <option value="">All hosts</option>
            ${allHostsInRegistry.map(em => `<option value="${em}">${em.split('@')[0]}</option>`).join('')}
          </select>
          <select id="recoClickFilter" onchange="renderRecoRegistry()" style="padding:8px 10px;border:1px solid var(--border);border-radius:6px;font-size:0.82rem;font-family:'DM Sans',sans-serif;">
            <option value="">All recos</option>
            <option value="clicked">Clicked only</option>
            <option value="dead">Zero clicks</option>
            <option value="cross">Cross-host (≥2)</option>
          </select>
          <button class="refresh-btn" onclick="exportRecoRegistry()">📥 Export CSV</button>
        </div>
        <div id="recoRegistryBody"></div>`;
      // Trigger initial render after the DOM update completes
      setTimeout(renderRecoRegistry, 0);
    }

    const hostRowsExisting = allProperties.map(p => {
      const email = p.owner_id ? (userIdToEmail[p.owner_id] || null) : null;
      const stats = email ? (userStats[email] || { sessions: new Set(), events: 0, saves: 0, exports: 0, bookings: 0, firstSeen: null, lastSeen: null }) : { sessions: new Set(), events: 0, saves: 0, exports: 0, bookings: 0, firstSeen: null, lastSeen: null };
      return { ...p, _email: email, _stats: stats };
    });

    const ownedEmails = new Set(hostRowsExisting.map(h => h._email).filter(Boolean));
    const orphanedUsers = Object.entries(userStats).filter(([email]) => !ownedEmails.has(email));

        <tbody>
          ${hostRowsExisting.sort((a, b) => (b._stats.lastSeen || '').localeCompare(a._stats.lastSeen || '')).map(p => {
            const s = p._stats;

            const setupPct = Math.round(setupScore / 5 * 100);
