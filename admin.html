  }

  // Feature usage
  if (featureUsage.length > 0) {
    html += `<div class="section-title">Feature Usage</div>
      <div style="background:var(--white);border:1px solid var(--border);border-radius:var(--radius);padding:16px 18px;box-shadow:var(--shadow);">
        <div class="bar-chart">
          ${featureUsage.map(f => `
            <div class="bar-row">
              <div class="bar-label">${f.label}</div>
              <div class="bar-track">
                <div class="bar-fill" style="width:${Math.round(f.count/maxFeature*100)}%;background:${f.color};"></div>
                <div class="bar-count">${f.count}</div>
              </div>
            </div>
          `).join('')}
        </div>
      </div>`;
  }

  // Panel time
  if (panelTimeEntries.length > 0) {
    html += `<div class="section-title">Time Spent per Section</div>
      <div style="background:var(--white);border:1px solid var(--border);border-radius:var(--radius);padding:16px 18px;box-shadow:var(--shadow);">
        <div class="bar-chart">
          ${panelTimeEntries.map(([k, v]) => `
            <div class="bar-row">
              <div class="bar-label">${panelLabels[k] || k}</div>
              <div class="bar-track">
                <div class="bar-fill" style="width:${Math.round(v/maxPanelTime*100)}%;background:var(--blue);"></div>
                <div class="bar-count">${fmtSec(v)}</div>
              </div>
            </div>
          `).join('')}
        </div>
      </div>`;
  }

  // ── Hosts & Properties (merged table) ──
  if (!isUserView) {
    const userIdToEmail = {};
    events.forEach(e => { if (e.user_id && e.user_email) userIdToEmail[e.user_id] = e.user_email; });

    // ══════════════════════════════════════════════════════════════════════
    // HOST PERFORMANCE — aggregate guest activity per host (across all their
    // properties) so admin can compare hosts apples-to-apples and surface
    // upsell / onboarding / partnership opportunities.
    // ══════════════════════════════════════════════════════════════════════

    // Build property → host email map. Falls back to scanning events for
    // property_id ↔ user_email co-occurrence so hosts who haven't signed in
    // recently still resolve.
    const propToEmail = {};
    allProperties.forEach(p => {
      if (p.owner_id && userIdToEmail[p.owner_id]) propToEmail[p.id] = userIdToEmail[p.owner_id];
    });
    // Fallback: any event with both property_id and user_email
    events.forEach(e => {
      if (e.property_id && e.user_email && !propToEmail[e.property_id]) {
        propToEmail[e.property_id] = e.user_email;
      }
    });

    // Group guest events by host email (host = owner of the property the
    // guest event happened on). Anonymous guest events without a resolvable
    // host are bucketed under '_unattributed'.
    const hostGuestStats = {}; // email → metrics
    function ensureHost(email) {
      if (!hostGuestStats[email]) {
        hostGuestStats[email] = {
          email, properties: new Set(), sessions: new Set(),
          opens: 0, started: 0, completed: 0,
          recoClicks: 0, chatMessages: 0, chatEscalations: 0,
          docScans: 0, hostReplies: 0, langs: {},
        };
      }
      return hostGuestStats[email];
    }
    // Pre-register every host that owns a property (even if no guest activity)
    Object.values(propToEmail).forEach(email => ensureHost(email));

    guestEvents.forEach(e => {
      const email = propToEmail[e.property_id] || '_unattributed';
      const h = ensureHost(email);
      if (e.property_id) h.properties.add(e.property_id);
      if (e.session_id)  h.sessions.add(e.session_id);
      if (e.event_type === 'guest_link_opened')        h.opens++;
      if (e.event_type === 'guest_checkin_started')    h.started++;
      if (e.event_type === 'guest_checkin_completed')  h.completed++;
      if (e.event_type === 'guest_reco_clicked')       h.recoClicks++;
      if (e.event_type === 'guest_chat_message')       h.chatMessages++;
      if (e.event_type === 'guest_chat_escalated')     h.chatEscalations++;
      if (e.event_type === 'guest_doc_scanned')        h.docScans++;
      const lng = e.event_data && e.event_data.lang;
      if (lng) h.langs[lng] = (h.langs[lng] || 0) + 1;
    });

    // Build leaderboard rows. Synthetic "engagement score" = weighted blend
    // of conversion + reco activity + chat — captures hosts whose guests
    // actually use the app vs hosts whose guests just open the link.
    const hostRows = Object.values(hostGuestStats)
      .filter(h => h.email !== '_unattributed' || h.sessions.size > 0)
      .map(h => {
        const sessions = h.sessions.size;
        const completionRate = h.opens > 0 ? Math.round(h.completed / h.opens * 100) : 0;
        const recoRate       = sessions > 0 ? Math.round(h.recoClicks / sessions * 100) : 0;
        const chatRate       = sessions > 0 ? Math.round(h.chatMessages / sessions * 100) : 0;
        // Engagement score: conversion (50pts) + reco use (25pts) + chat (25pts).
        // Caps each component so a single chatty session can't dominate.
        const score = Math.round(
          (completionRate * 0.5) +
          Math.min(50, recoRate) * 0.5 +
          Math.min(50, chatRate) * 0.5
        );
        const tier = score >= 60 ? 'gold' : score >= 35 ? 'silver' : score >= 15 ? 'bronze' : 'dormant';
        const dominantLang = Object.entries(h.langs).sort((a, b) => b[1] - a[1])[0];
        return {
          email: h.email,
          properties: h.properties.size || (h.email !== '_unattributed' ? allProperties.filter(p => propToEmail[p.id] === h.email).length : 0),
          sessions, completed: h.completed, completionRate,
          recoClicks: h.recoClicks, recoRate,
          chatMessages: h.chatMessages, chatEscalations: h.chatEscalations, chatRate,
          docScans: h.docScans,
          score, tier,
          dominantLang: dominantLang ? dominantLang[0].toUpperCase() : '—',
        };
      });

    // Sort: engagement score desc; ties → sessions desc.
    hostRows.sort((a, b) => (b.score - a.score) || (b.sessions - a.sessions));

    if (hostRows.length > 0) {
      const tierColor = { gold: '#C9A96E', silver: '#8B9DAB', bronze: '#B07A4B', dormant: '#A0978C' };
      const tierLabel = { gold: '🥇 Gold', silver: '🥈 Silver', bronze: '🥉 Bronze', dormant: '💤 Dormant' };

      html += `<div class="section-title">Host Performance Leaderboard (${hostRows.length})</div>
        <div style="font-size:0.78rem;color:var(--ink-soft);margin-bottom:10px;">
          Engagement score blends check-in completion + recommendation usage + chat activity. Use it to spot top performers, partnership candidates, and hosts who need onboarding help.
        </div>
        <div style="overflow-x:auto;margin-bottom:10px;">
        <table class="data-table" style="width:100%;min-width:880px;">
          <thead><tr>
            <th>#</th><th>Host</th><th>Tier</th><th style="text-align:right;">Score</th>
            <th style="text-align:right;">Props</th><th style="text-align:right;">Sessions</th>
            <th style="text-align:right;">Compl.</th><th style="text-align:right;">Reco clicks</th>
            <th style="text-align:right;">Chat msgs</th><th style="text-align:right;">Help reqs</th>
            <th>Lang</th>
          </tr></thead>
          <tbody>
            ${hostRows.map((r, i) => {
              const isUnatt = r.email === '_unattributed';
              const display = isUnatt ? '<em style="color:var(--ink-soft)">Unattributed</em>' : `<strong>${r.email.split('@')[0]}</strong><br><span style="font-size:0.65rem;color:var(--ink-soft)">${r.email}</span>`;
              return `<tr>
                <td style="font-weight:600;color:var(--ink-soft);">${i + 1}</td>
                <td>${display}</td>
                <td><span style="display:inline-block;padding:2px 8px;border-radius:10px;background:${tierColor[r.tier]}22;color:${tierColor[r.tier]};font-size:0.7rem;font-weight:600;white-space:nowrap;">${tierLabel[r.tier]}</span></td>
                <td style="text-align:right;font-weight:600;font-family:'Playfair Display',serif;font-size:1rem;color:${r.score >= 60 ? 'var(--green)' : r.score >= 35 ? 'var(--amber)' : 'var(--ink-soft)'};">${r.score}</td>
                <td style="text-align:right;">${r.properties}</td>
                <td style="text-align:right;">${r.sessions}</td>
                <td style="text-align:right;">${r.completed} <span style="color:var(--ink-soft);font-size:0.7rem;">(${r.completionRate}%)</span></td>
                <td style="text-align:right;${r.recoClicks > 0 ? 'color:var(--warm);font-weight:500;' : ''}">${r.recoClicks}</td>
                <td style="text-align:right;${r.chatMessages > 0 ? 'color:var(--blue);font-weight:500;' : ''}">${r.chatMessages}</td>
                <td style="text-align:right;${r.chatEscalations > 0 ? 'color:var(--red);font-weight:500;' : ''}">${r.chatEscalations}</td>
                <td style="font-size:0.72rem;color:var(--ink-soft);">${r.dominantLang}</td>
              </tr>`;
            }).join('')}
          </tbody>
        </table></div>`;

      // ══════════════════════════════════════════════════════════════════════
      // BUSINESS OPPORTUNITIES — derived signals for action
      // ══════════════════════════════════════════════════════════════════════
      const namedHosts = hostRows.filter(r => r.email !== '_unattributed');
      const goldHosts    = namedHosts.filter(r => r.tier === 'gold');
      const silverHosts  = namedHosts.filter(r => r.tier === 'silver');
      const dormantHosts = namedHosts.filter(r => r.tier === 'dormant' && r.sessions > 0);
      // High traffic, low conversion = "leaving money on the table"
      const leakyHosts = namedHosts.filter(r => r.sessions >= 5 && r.completionRate < 40 && r.completed === 0);
      // High help-request rate = candidate for managed-concierge upsell
      const helpHeavyHosts = namedHosts.filter(r => r.sessions >= 3 && (r.chatEscalations / Math.max(1, r.sessions)) >= 0.4);
      // Setup-incomplete properties (re-use existing setupScore from the table below)
      const incompleteProps = allProperties.filter(p => {
        const score = [p.wifi_name, p.host_names, p.host_phone, p.address, p.cir_code].filter(Boolean).length;
        return score < 4;
      });

      const oppCard = (icon, title, count, body, color) => `
        <div style="background:var(--white);border:1px solid var(--border);border-left:3px solid ${color};border-radius:var(--radius);padding:12px 14px;box-shadow:var(--shadow);">
          <div style="display:flex;align-items:center;gap:8px;margin-bottom:6px;">
            <span style="font-size:1.1rem;">${icon}</span>
            <span style="font-size:0.7rem;letter-spacing:0.1em;text-transform:uppercase;color:var(--ink-2);font-weight:600;">${title}</span>
            <span style="margin-left:auto;font-family:'Playfair Display',serif;font-size:1.3rem;color:${color};font-weight:600;line-height:1;">${count}</span>
          </div>
          <div style="font-size:0.76rem;color:var(--ink-soft);line-height:1.4;">${body}</div>
        </div>`;

      html += `<div class="section-title">Business Opportunities</div>
        <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:10px;margin-bottom:10px;">
          ${oppCard('🥇', 'Top hosts (premium tier)', goldHosts.length,
            `High-engagement hosts — candidates for "Curator" badge, custom AI voice, featured listings. ${goldHosts.slice(0,3).map(h => h.email.split('@')[0]).join(', ')}${goldHosts.length > 3 ? '…' : ''}`, '#C9A96E')}
          ${oppCard('💡', 'Leaky funnel', leakyHosts.length,
            `Traffic but no completed check-ins — listing optimization or photo audit could unlock revenue. ${leakyHosts.slice(0,3).map(h => h.email.split('@')[0]).join(', ')}${leakyHosts.length > 3 ? '…' : ''}`, 'var(--amber)')}
          ${oppCard('💬', 'Concierge upsell', helpHeavyHosts.length,
            `Guests frequently asking for human help — ideal for managed-concierge tier (paid human-in-the-loop). ${helpHeavyHosts.slice(0,3).map(h => h.email.split('@')[0]).join(', ')}${helpHeavyHosts.length > 3 ? '…' : ''}`, 'var(--blue)')}
          ${oppCard('🛠️', 'Onboarding outreach', incompleteProps.length,
            `Properties with &lt;80% setup completion — automated email or 1:1 onboarding reduces churn risk.`, 'var(--red)')}
          ${oppCard('💤', 'Re-engagement', dormantHosts.length,
            `Active hosts whose guests barely engage with the app — needs hands-on help or product education.`, '#A0978C')}
          ${oppCard('🎯', 'Silver hosts (mid-funnel)', silverHosts.length,
            `Solid hosts with room to grow — small nudges (more recos, better welcome message) could promote them to Gold.`, '#8B9DAB')}
        </div>`;

      // ══════════════════════════════════════════════════════════════════════
      // ROUND 11.2 — QUESTION GAPS + FUNNEL DROP-OFF
      // Strategic, product-level insights. The host card answers "what should
      // I do today?"; these answer "what should I fix in the product?"
      // ══════════════════════════════════════════════════════════════════════

      // ── Question Gaps ──
      const gaps = _r112BuildQuestionGaps(allChatMessages || []);
      const totalGuestMsgs = (allChatMessages || []).filter(m => m.sender === 'guest').length;
      const propsWithGuestChats = new Set((allChatMessages || []).filter(m => m.sender === 'guest' && m.property_id).map(m => m.property_id)).size;

      const gapsBody = gaps.length === 0
        ? `<div style="font-size:0.82rem;color:var(--ink-soft);padding:12px;background:rgba(250,246,240,0.5);border-radius:6px;">${totalGuestMsgs === 0 ? 'No guest chat messages yet in this period.' : 'Not enough recurring topics to surface gaps yet.'}</div>`
        : gaps.map((g, i) => {
            const exTxt = g.example && g.example.msg ? g.example.msg.replace(/\s+/g, ' ').trim() : '';
            const exShort = exTxt.length > 110 ? exTxt.slice(0, 107) + '…' : exTxt;
            const safeWord = g.word.replace(/[<>&]/g, c => ({'<':'&lt;','>':'&gt;','&':'&amp;'}[c]));
            const safeEx = exShort.replace(/[<>&]/g, c => ({'<':'&lt;','>':'&gt;','&':'&amp;'}[c]));
            const crossHost = g.properties >= 2;
            return `
              <div style="display:flex;align-items:flex-start;gap:12px;padding:10px 0;border-bottom:1px solid rgba(74,46,32,0.06);">
                <div style="font-size:0.7rem;color:var(--ink-2);font-weight:600;width:18px;flex-shrink:0;text-align:right;">${i + 1}</div>
                <div style="flex:1;min-width:0;">
                  <div style="display:flex;align-items:center;gap:8px;margin-bottom:3px;flex-wrap:wrap;">
                    <span style="font-weight:600;color:var(--ink);font-size:0.92rem;">${safeWord}</span>
                    ${crossHost ? `<span style="font-size:0.6rem;letter-spacing:0.08em;text-transform:uppercase;color:#b03939;font-weight:600;background:rgba(224,90,90,0.1);padding:2px 6px;border-radius:3px;">cross-host</span>` : ''}
                    <span style="font-size:0.7rem;color:var(--ink-soft);">${g.count} msgs · ${g.properties} ${g.properties === 1 ? 'property' : 'properties'}</span>
                  </div>
                  ${exShort ? `<div style="font-size:0.76rem;color:var(--ink-soft);font-style:italic;line-height:1.4;">"${safeEx}"</div>` : ''}
                </div>
              </div>`;
          }).join('');

      html += `
        <div class="section-title">Question Gaps</div>
        <div style="background:var(--white);border:1px solid var(--border);border-radius:var(--radius);padding:18px 22px;box-shadow:var(--shadow);margin-bottom:18px;">
          <div style="font-size:0.78rem;color:var(--ink-soft);margin-bottom:14px;line-height:1.5;">
            Most-mentioned topics in guest chat messages. Topics appearing across multiple properties (<span style="color:#b03939;font-weight:600;">cross-host</span>) are platform-level content gaps — fix once, every host benefits.
            Sample: <strong>${totalGuestMsgs}</strong> guest messages from <strong>${propsWithGuestChats}</strong> ${propsWithGuestChats === 1 ? 'property' : 'properties'}.
          </div>
          ${gapsBody}
        </div>`;

      // ── Funnel Drop-off ──
      const propToEmailFunnel = propToEmail; // already built above
      const funnel = _r112BuildFunnel(guestEvents, allProperties, propToEmailFunnel);
      const platformOpened    = Math.max(funnel.opened, funnel.started, funnel.completed);
      const startedRate       = platformOpened > 0 ? Math.round(funnel.started / platformOpened * 100) : 0;
      const completedRate     = platformOpened > 0 ? Math.round(funnel.completed / platformOpened * 100) : 0;
      const startedDrop       = platformOpened - funnel.started;
      const completedDrop     = funnel.started - funnel.completed;
      const startedDropPct    = platformOpened > 0 ? Math.round(startedDrop / platformOpened * 100) : 0;
      const completedDropPct  = funnel.started > 0 ? Math.round(completedDrop / funnel.started * 100) : 0;

      const funnelBar = (label, count, total, dropCount, dropPct) => {
        const pct = total > 0 ? Math.round(count / total * 100) : 0;
        return `
          <div style="display:grid;grid-template-columns:140px 1fr 100px;align-items:center;gap:12px;padding:8px 0;">
            <div style="font-size:0.82rem;color:var(--ink);font-weight:500;">${label}</div>
            <div style="background:rgba(74,46,32,0.06);border-radius:4px;height:22px;position:relative;overflow:hidden;">
              <div style="background:linear-gradient(90deg,#C2714F,#D4876A);height:100%;width:${Math.max(pct, 4)}%;border-radius:4px;display:flex;align-items:center;padding:0 8px;color:#fff;font-size:0.72rem;font-weight:600;">${pct >= 15 ? pct + '%' : ''}</div>
            </div>
            <div style="text-align:right;font-size:0.82rem;color:var(--ink-soft);">
              ${count}${dropCount !== null ? ` <span style="color:#b03939;font-weight:600;">−${dropCount} (${dropPct}%)</span>` : ''}
            </div>
          </div>`;
      };

      const worstHtml = funnel.worst.length === 0
        ? `<div style="font-size:0.78rem;color:var(--ink-soft);padding:8px;">Need ≥5 sessions per property for meaningful comparison. Not enough data yet.</div>`
        : funnel.worst.map(p => {
            const safeName = p.name.replace(/[<>&]/g, c => ({'<':'&lt;','>':'&gt;','&':'&amp;'}[c]));
            const tone = p.doneRate < 30 ? '#b03939' : p.doneRate < 50 ? '#8a6914' : 'var(--ink-soft)';
            return `
              <div style="display:grid;grid-template-columns:1fr 70px 80px 80px;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid rgba(74,46,32,0.06);font-size:0.82rem;">
                <div style="min-width:0;">
                  <div style="font-weight:500;color:var(--ink);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${safeName}</div>
                  <div style="font-size:0.68rem;color:var(--ink-soft);">${p.hostShort}</div>
                </div>
                <div style="text-align:right;color:var(--ink-soft);">${p.opened} opens</div>
                <div style="text-align:right;color:var(--ink-soft);">${p.started} starts</div>
                <div style="text-align:right;color:${tone};font-weight:600;">${p.doneRate}%</div>
              </div>`;
          }).join('');

      html += `
        <div class="section-title">Funnel Drop-off</div>
        <div style="background:var(--white);border:1px solid var(--border);border-radius:var(--radius);padding:18px 22px;box-shadow:var(--shadow);margin-bottom:18px;">
          <div style="font-size:0.78rem;color:var(--ink-soft);margin-bottom:14px;line-height:1.5;">
            Where guests drop off in the check-in flow. Big drops between steps signal UX or trust issues — investigate the highest-drop step first.
          </div>
          <div style="font-size:0.7rem;letter-spacing:0.1em;text-transform:uppercase;color:var(--ink-2);font-weight:600;margin-bottom:6px;">Platform-wide</div>

        if (e.created_at > clickMap[key].lastClick) clickMap[key].lastClick = e.created_at;
      });

      // Cross-host: same name across properties → "also recommended by" count

      allRecommendations.forEach(r => {
        if (!r.name) return;
        if (!nameToHosts[r.name]) nameToHosts[r.name] = new Set();
        const email = propToEmail[r.property_id] || '_unknown';
        nameToHosts[r.name].add(email);

      // Build registry rows from recommendations table (so zero-click recos

        const hostEmail = propToEmail[r.property_id] || null;
        const crossHostCount = (nameToHosts[r.name] && nameToHosts[r.name].size) || 1;
        return {
          id: r.id,
          name: r.name || '—',

// Column definitions for the registry table. Numeric/date columns default
// to descending on first click (most-clicked / most-recent first feels
// natural). Text columns default to ascending.
const RECO_COLUMNS = [
  { key: 'index',      label: '#',          sortable: false, align: 'left'  },
  { key: 'name',       label: 'Venue',      sortable: true,  align: 'left',  defaultDir: 'asc'  },
  { key: 'category',   label: 'Category',   sortable: true,  align: 'left',  defaultDir: 'asc'  },
  { key: 'host',       label: 'Host',       sortable: true,  align: 'left',  defaultDir: 'asc'  },
  { key: 'property',   label: 'Property',   sortable: true,  align: 'left',  defaultDir: 'asc'  },
  { key: 'clicks',     label: 'Clicks',     sortable: true,  align: 'right', defaultDir: 'desc' },
  { key: 'cross',      label: 'Hosts rec.', sortable: true,  align: 'right', defaultDir: 'desc' },
  { key: 'lastClick',  label: 'Last click', sortable: true,  align: 'left',  defaultDir: 'desc' },
  { key: 'address',    label: 'Address',    sortable: false, align: 'left'  },
  { key: 'actions',    label: 'Actions',    sortable: false, align: 'left'  },
];

// Column-keyed comparators — pull values out of a row.
function recoSortComparator(col, dir) {
  const mul = dir === 'desc' ? -1 : 1;
  const num = (a, b, get) => (get(a) - get(b)) * mul;
  const str = (a, b, get) => (get(a) || '').localeCompare(get(b) || '') * mul;
  switch (col) {
    case 'name':      return (a, b) => str(a, b, r => r.name);
    case 'category':  return (a, b) => str(a, b, r => r.category) || (b.clicks - a.clicks);
    case 'host':      return (a, b) => str(a, b, r => r.hostShort || 'zzz');
    case 'property':  return (a, b) => str(a, b, r => r.propertyName);
    case 'clicks':    return (a, b) => num(a, b, r => r.clicks)      || (a.name.localeCompare(b.name));
    case 'cross':     return (a, b) => num(a, b, r => r.crossHostCount) || (b.clicks - a.clicks);
    case 'lastClick': return (a, b) => str(a, b, r => r.lastClick || '');
    default:          return (a, b) => b.clicks - a.clicks;
  }
}

// Click handler for column headers — exposed on window for inline onclick.
window.sortRecoBy = function (colKey) {
  const col = RECO_COLUMNS.find(c => c.key === colKey);
  if (!col || !col.sortable) return;
  const cur = window._recoSort || { col: 'clicks', dir: 'desc' };
  if (cur.col === colKey) {
    cur.dir = cur.dir === 'asc' ? 'desc' : 'asc';
  } else {
    cur.col = colKey;
    cur.dir = col.defaultDir || 'asc';
  }
  window._recoSort = cur;
  renderRecoRegistry();
};

function renderRecoRegistry() {
  const body = document.getElementById('recoRegistryBody');
  if (!body || !window._recoRegistry) return;
  const rows = window._recoRegistry;
  const search = (document.getElementById('recoSearch')?.value || '').toLowerCase().trim();
  const cat = document.getElementById('recoCatFilter')?.value || '';
  const hostFilter = document.getElementById('recoHostFilter')?.value || '';
  const clickFilter = document.getElementById('recoClickFilter')?.value || '';
  const sort = window._recoSort || (window._recoSort = { col: 'clicks', dir: 'desc' });

  let filtered = rows.filter(r => {
    if (cat && r.category !== cat) return false;
    if (hostFilter && r.hostEmail !== hostFilter) return false;
    if (clickFilter === 'clicked' && r.clicks === 0) return false;
    if (clickFilter === 'dead'    && r.clicks > 0)   return false;
    if (clickFilter === 'cross'   && r.crossHostCount < 2) return false;
    if (search) {
      const hay = (r.name + ' ' + r.desc + ' ' + r.address + ' ' + r.tags + ' ' + (r.hostEmail || '') + ' ' + r.propertyName).toLowerCase();
      if (!hay.includes(search)) return false;
    }
    return true;
  });

  filtered = filtered.slice().sort(recoSortComparator(sort.col, sort.dir));

  if (filtered.length === 0) {
    body.innerHTML = `<div class="loading">No recommendations match your filters.</div>`;
    return;
  }

  const safe = (s) => String(s == null ? '' : s).replace(/[<>&"]/g, c => ({'<':'&lt;','>':'&gt;','&':'&amp;','"':'&quot;'}[c]));
  const fmtDate = (iso) => iso ? new Date(iso).toLocaleDateString() : '—';

  // Cap displayed rows for browser perf — export ignores this cap so the
  // admin can pull the full filtered set as CSV.
  const cap = 500;
  const display = filtered.slice(0, cap);

  // Build sortable header cells with arrow indicators. Sticky positioning
  // keeps headers visible during vertical scroll. Background must be opaque
  // (not rgba <1) or scrolling tbody bleeds through.
  const arrow = (col) => {
    if (!col.sortable) return '';
    if (sort.col !== col.key) return '<span style="opacity:0.25;margin-left:4px;font-size:0.7rem;">⇅</span>';
    return sort.dir === 'asc'
      ? '<span style="margin-left:4px;font-size:0.72rem;color:var(--warm);">▲</span>'
      : '<span style="margin-left:4px;font-size:0.72rem;color:var(--warm);">▼</span>';
  };
  const headerCell = (col) => {
    const sortableStyle = col.sortable ? 'cursor:pointer;user-select:none;' : '';
    const onclick = col.sortable ? `onclick="sortRecoBy('${col.key}')"` : '';
    const activeStyle = (col.sortable && sort.col === col.key) ? 'color:var(--ink);' : '';
    return `<th ${onclick} style="position:sticky;top:0;z-index:2;background:var(--cream-2);text-align:${col.align};${sortableStyle}${activeStyle}white-space:nowrap;">${col.label}${arrow(col)}</th>`;
  };

  body.innerHTML = `
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;font-size:0.72rem;color:var(--ink-soft);">
      <span>Showing ${display.length} of ${filtered.length} recos${filtered.length > cap ? ' — export to see all' : ''}</span>
      <span>Sorted by <strong style="color:var(--ink-2);">${RECO_COLUMNS.find(c => c.key === sort.col)?.label || '—'}</strong> ${sort.dir === 'asc' ? '▲' : '▼'} · Click any column to sort</span>
    </div>
    <div id="recoRegistryScroll" style="max-height:560px;overflow:auto;border:1px solid var(--border);border-radius:var(--radius);background:var(--white);box-shadow:var(--shadow);margin-bottom:14px;">
    <table class="data-table" style="width:auto;min-width:1240px;border:none;border-radius:0;box-shadow:none;">
      <thead>
        <tr>
          ${RECO_COLUMNS.map(headerCell).join('')}
        </tr>
      </thead>
      <tbody>
        ${display.map((r, i) => {
          const cross = r.crossHostCount > 1
            ? `<span style="background:rgba(76,175,125,0.12);color:#2d7a4a;padding:1px 6px;border-radius:4px;font-size:0.65rem;font-weight:600;margin-left:5px;white-space:nowrap;">×${r.crossHostCount}</span>`
            : '';
          const clickStyle = r.clicks > 0 ? 'color:var(--warm);font-weight:600;' : 'color:var(--ink-soft);opacity:0.5;';
          const descSnippet = r.desc ? `<div style="font-size:0.68rem;color:var(--ink-soft);margin-top:2px;line-height:1.3;max-width:280px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${safe(r.desc)}</div>` : '';
          return `<tr class="${adminRowClass(r)}">
            <td style="color:var(--ink-soft);font-weight:600;">${i + 1}</td>
            <td><strong>${safe(r.name)}</strong>${cross}${descSnippet}</td>
            <td style="font-size:0.7rem;text-transform:uppercase;letter-spacing:0.06em;color:var(--ink-soft);white-space:nowrap;">${safe(r.category) || '—'}</td>
            <td>${r.hostEmail
              ? `<button onclick="document.getElementById('userFilter').value='${safe(r.hostEmail)}';renderView();" style="background:none;border:none;padding:0;color:var(--warm);font-size:0.78rem;font-weight:500;cursor:pointer;text-align:left;font-family:inherit;white-space:nowrap;">${safe(r.hostShort)}</button>`
              : '<span style="color:var(--ink-soft);font-style:italic;">—</span>'}</td>
            <td style="font-size:0.78rem;white-space:nowrap;">${safe(r.propertyName)}</td>
            <td style="text-align:right;${clickStyle}">${r.clicks}</td>
            <td style="text-align:right;">${r.crossHostCount}</td>
            <td style="font-size:0.72rem;color:var(--ink-soft);white-space:nowrap;">${fmtDate(r.lastClick)}</td>
            <td style="font-size:0.72rem;color:var(--ink-soft);max-width:220px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${safe(r.address) || '—'}</td>
            <td>${adminRowActions('recommendations', r)}</td>
          </tr>`;
        }).join('')}
      </tbody>
    </table></div>`;
}

function exportRecoRegistry() {
  const rows = window._recoRegistry || [];
  if (rows.length === 0) return;
  // Apply current filters/sort so export matches what admin is looking at
  const search = (document.getElementById('recoSearch')?.value || '').toLowerCase().trim();
  const cat = document.getElementById('recoCatFilter')?.value || '';
  const hostFilter = document.getElementById('recoHostFilter')?.value || '';
  const clickFilter = document.getElementById('recoClickFilter')?.value || '';
  const sort = window._recoSort || { col: 'clicks', dir: 'desc' };

  let filtered = rows.filter(r => {
    if (cat && r.category !== cat) return false;
    if (hostFilter && r.hostEmail !== hostFilter) return false;
    if (clickFilter === 'clicked' && r.clicks === 0) return false;
    if (clickFilter === 'dead'    && r.clicks > 0)   return false;
    if (clickFilter === 'cross'   && r.crossHostCount < 2) return false;
    if (search) {
      const hay = (r.name + ' ' + r.desc + ' ' + r.address + ' ' + r.tags + ' ' + (r.hostEmail || '') + ' ' + r.propertyName).toLowerCase();
      if (!hay.includes(search)) return false;
    }
    return true;
  });
  filtered = filtered.slice().sort(recoSortComparator(sort.col, sort.dir));

  const headers = ['venue','category','host_email','property','clicks','hosts_recommending','last_click','address','description','tags'];
  const csvRows = filtered.map(r => [
    r.name, r.category, r.hostEmail || '', r.propertyName,
    r.clicks, r.crossHostCount, r.lastClick || '',
    r.address, r.desc, r.tags,
  ].map(v => `"${String(v == null ? '' : v).replace(/"/g, '""')}"`).join(','));
  const csv = '\uFEFF' + [headers.join(','), ...csvRows].join('\n');
  const date = new Date().toISOString().slice(0, 10);
  downloadFile(`wbnb_recommendations_${date}.csv`, csv, 'text/csv');
}

/* ══════════════════════════════════════
   ADMIN AUTH — gates the entire console.
   Logged-in user must (a) have a valid Supabase session AND (b) appear
   in the admin_users table. Both checks are client-side — see the README
   note in the comment above. They filter casual access; for hardened
   security we'd add an Edge Function with a service-role key.
══════════════════════════════════════ */

let _adminEmail = null;

async function isAdmin(email) {
  if (!email) return false;
  try {
    const { data, error } = await sb.from('admin_users')
      .select('email')
      .eq('email', email.toLowerCase())
      .maybeSingle();
    if (error) {
      console.warn('admin_users lookup error:', error.message);
      return false;
    }
    return !!data;
  } catch (e) {
    console.warn('admin_users lookup exception:', e);
    return false;
  }
}

function showLoginError(msg) {
  const el = document.getElementById('loginError');
  el.textContent = msg;
  el.classList.add('show');
}
function clearLoginError() {
  document.getElementById('loginError').classList.remove('show');
}

async function adminSignIn() {
  clearLoginError();
  const email = document.getElementById('loginEmail').value.trim();
  const password = document.getElementById('loginPassword').value;
  if (!email || !password) { showLoginError('Email and password are required.'); return; }

  const btn = document.getElementById('loginBtn');
  btn.disabled = true;
  btn.textContent = 'Signing in…';

  try {
    const { data, error } = await sb.auth.signInWithPassword({ email, password });
    if (error) {
      showLoginError(error.message || 'Sign-in failed.');
      btn.disabled = false; btn.textContent = 'Sign In';
      return;
    }

    const signedInEmail = data?.user?.email;
    const ok = await isAdmin(signedInEmail);
    if (!ok) {
      // Sign them out — they have a valid Supabase user but aren't an admin.
      await sb.auth.signOut();
      showLoginError('This account is not authorised for admin access.');
      btn.disabled = false; btn.textContent = 'Sign In';
      return;
    }

    // Clear sensitive fields before showing the console
    document.getElementById('loginPassword').value = '';
    enterAdminConsole(signedInEmail);
  } catch (e) {
    showLoginError('Connection error. Try again.');
    btn.disabled = false; btn.textContent = 'Sign In';
  }
}

async function adminSignOut() {
  await sb.auth.signOut();
  _adminEmail = null;
  document.getElementById('topBarUser').style.display = 'none';
  document.getElementById('topBarSignOut').style.display = 'none';
  document.getElementById('loginOverlay').classList.remove('hidden');
  document.getElementById('loginEmail').value = '';
  document.getElementById('loginPassword').value = '';
  document.getElementById('content').innerHTML = '<div class="loading">Loading analytics…</div>';
  clearLoginError();
}

function enterAdminConsole(email) {
  _adminEmail = email;
  document.getElementById('topBarUserEmail').textContent = email;
  document.getElementById('topBarUser').style.display = 'flex';
  document.getElementById('topBarSignOut').style.display = 'inline-block';
  document.getElementById('loginOverlay').classList.add('hidden');
  loadData();
}

// Boot: check for an existing session. If present and still valid as
// admin, skip login. Otherwise show the login overlay.
(async function boot() {
  try {
    const { data: { session } } = await sb.auth.getSession();
    if (session?.user?.email) {
      const ok = await isAdmin(session.user.email);
      if (ok) {
        enterAdminConsole(session.user.email);
        return;
      } else {
        // Session exists but user is no longer in admin_users — sign out.
        await sb.auth.signOut();
      }
    }
  } catch (e) {
    console.warn('Session check failed:', e);
  }
  // Show login overlay (it's already visible by default in the DOM).
})();

// Submit on Enter for both fields
document.addEventListener('DOMContentLoaded', () => {
  ['loginEmail', 'loginPassword'].forEach(id => {
    const el = document.getElementById(id);
    if (el) el.addEventListener('keydown', e => {
      if (e.key === 'Enter') adminSignIn();
    });
  });
});
</script>
